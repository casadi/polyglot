name: build libMad bundle

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/build-libmad.yml
      - scripts/**
  workflow_dispatch:
    inputs:
      libmad_repo:
        description: libMad repo (owner/name)
        required: false
        default: jgillis/libMad
      libmad_ref:
        description: libMad branch / tag / sha
        required: false
        default: claude/ubuntu-manylinux-2-28-kLLSc
  schedule:
    # Weekly rebuild against latest polyglot image, in case upstream libMad
    # deps drift. Delete if not wanted.
    - cron: "17 4 * * 1"

permissions:
  contents: read
  packages: read

concurrency:
  group: libmad-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: libMad ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            polyglot_image: ghcr.io/${{ github.repository_owner }}/manylinux_2_28-x64-polyglot:production
            runner: ubuntu-latest
          - arch: aarch64
            polyglot_image: ghcr.io/${{ github.repository_owner }}/manylinux_2_28-aarch64-polyglot:production
            runner: ubuntu-24.04-arm

    env:
      LIBMAD_REPO: ${{ github.event.inputs.libmad_repo || 'jgillis/libMad' }}
      LIBMAD_REF: ${{ github.event.inputs.libmad_ref || 'claude/ubuntu-manylinux-2-28-kLLSc' }}
      POLYGLOT_IMAGE: ${{ matrix.polyglot_image }}

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull polyglot image
        run: docker pull "$POLYGLOT_IMAGE"

      - name: Checkout libMad
        uses: actions/checkout@v4
        with:
          repository: ${{ env.LIBMAD_REPO }}
          ref: ${{ env.LIBMAD_REF }}
          path: libMad
          fetch-depth: 1

      - name: Checkout this repo (for scripts/)
        uses: actions/checkout@v4
        with:
          path: polyglot

      - name: Add 16G swap (aarch64 OOM mitigation)
        # ubuntu-24.04-arm ships only 3 GB swap + 16 GB RAM. The juliac AOT
        # compile of MadNLP+CUDA blows past that ceiling and the runner gets
        # OOM-killed mid-step, leaving the GitHub job in a zombie state
        # until heartbeat timeout (~68 min). Add a separate 16 GB swap file
        # under /mnt (the runner's larger ephemeral volume) so the compile
        # spills rather than dies. Don't touch the existing /swapfile —
        # fallocate on it fails with "Text file busy" since it's active.
        if: matrix.arch == 'aarch64'
        run: |
          set -eux
          free -h
          df -h /mnt /
          sudo fallocate -l 16G /mnt/polyglot-swapfile
          sudo chmod 600 /mnt/polyglot-swapfile
          sudo mkswap /mnt/polyglot-swapfile
          sudo swapon /mnt/polyglot-swapfile
          free -h
          swapon --show

      - name: Build libMad inside polyglot image
        run: |
          set -euxo pipefail
          mkdir -p build out
          # Tee output to a file so a runner-side log-stream death (which is
          # what aarch64 has been hitting at the long juliac AOT step) still
          # leaves a forensics trail we can upload as an artifact.
          docker run --rm \
            -v "$PWD/libMad:/work/libMad:ro" \
            -v "$PWD/polyglot/scripts:/work/scripts:ro" \
            -v "$PWD/build:/work/build" \
            -v "$PWD/out:/work/out" \
            -e JULIA_PKG_USE_CLI_GIT=true \
            "$POLYGLOT_IMAGE" \
            bash /work/scripts/build-libmad.sh 2>&1 | tee build/libmad-build.log

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: libmad-build-log-${{ matrix.arch }}
          path: build/libmad-build.log
          if-no-files-found: warn

      - name: Inspect libMad.so manylinux compliance
        run: |
          set -e
          SO=$(find build/install -name 'libMad.so*' -type f | head -1)
          test -n "$SO"
          echo "=== $SO ==="
          file "$SO"
          echo "=== NEEDED ==="; objdump -p "$SO" | grep NEEDED
          echo "=== required GLIBC ==="; objdump -T "$SO" | grep -oE 'GLIBC_[0-9.]+' | sort -Vu
          echo "=== required GLIBCXX ==="; objdump -T "$SO" | grep -oE 'GLIBCXX_[0-9.]+' | sort -Vu || echo "(none)"
          echo "=== required CXXABI ==="; objdump -T "$SO" | grep -oE 'CXXABI_[0-9.]+' | sort -Vu || echo "(none)"
          if objdump -p "$SO" | grep -q 'NEEDED.*libunwind'; then
            echo "FAIL: libMad.so has a NEEDED on libunwind" >&2; exit 1
          fi
          if find build/install -name 'libunwind*' | grep -q .; then
            echo "FAIL: libunwind made it into the install tree:" >&2
            find build/install -name 'libunwind*' >&2
            exit 1
          fi

      - name: Upload libMad bundle
        uses: actions/upload-artifact@v4
        with:
          name: libMad-${{ matrix.arch }}
          path: out/libMad-${{ matrix.arch }}.tar.gz
          if-no-files-found: error
