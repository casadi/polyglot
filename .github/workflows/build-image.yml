name: build manylinux_2_28-x64-polyglot

on:
  push:
    branches: [docker-manylinux_2_28-x64]
    paths:
      - Dockerfile
      - scripts/**
      - .github/workflows/build-image.yml
  workflow_dispatch:
    inputs:
      julia_version:
        description: Julia version to bake in
        required: false
        default: "1.12.6"
      push:
        description: Push the resulting image to ghcr.io (false = build-only)
        required: false
        default: "true"

permissions:
  contents: read
  packages: write

# Per-branch concurrency: pushing to this branch only cancels this branch's
# in-flight build. Other variants on their own docker-* branches are unaffected.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/manylinux_2_28-x64-polyglot
  BASE_IMAGE: ghcr.io/jgillis/manylinux_2_28-x64:production
  TARGET_ARCH: x86_64
  # BUILD_JOBS=1 to bypass the BuildKit `docker build` + parallel-make race
  # in Julia's deps phase (`gcc: error: x86_64: linker input file not found`
  # from configure scripts under -j>1). ~25 min deps phase vs ~12 with -j4.
  BUILD_JOBS: 1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3

      - name: Resolve tags
        id: tags
        run: |
          JULIA_VERSION="${{ github.event.inputs.julia_version || '1.12.6' }}"
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          {
            echo "julia_version=${JULIA_VERSION}"
            echo "tag_prod=${{ env.IMAGE }}:production"
            echo "tag_sha=${{ env.IMAGE }}:${SHA}"
            echo "tag_jl=${{ env.IMAGE }}:julia${JULIA_VERSION}"
          } >> "$GITHUB_OUTPUT"

      - name: Build (and conditionally push) image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
            TARGET_ARCH=${{ env.TARGET_ARCH }}
            JULIA_VERSION=${{ steps.tags.outputs.julia_version }}
            BUILD_JOBS=${{ env.BUILD_JOBS }}
          push: ${{ github.event.inputs.push != 'false' }}
          tags: |
            ${{ steps.tags.outputs.tag_prod }}
            ${{ steps.tags.outputs.tag_sha }}
            ${{ steps.tags.outputs.tag_jl }}
          cache-from: type=gha,scope=manylinux_2_28-x64-polyglot
          cache-to: type=gha,scope=manylinux_2_28-x64-polyglot,mode=max
          provenance: false
