name: build manylinux_2_28-aarch64-polyglot

on:
  push:
    branches: [docker-manylinux_2_28-aarch64]
    paths:
      - scripts/**
      - .github/workflows/build-image.yml
  workflow_dispatch:
    inputs:
      julia_version:
        description: Julia version to bake in
        required: false
        default: "1.12.6"
      push:
        description: Push the resulting image to ghcr.io (false = build-only)
        required: false
        default: "true"

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/manylinux_2_28-aarch64-polyglot
  # PyPA upstream — a NATIVE aarch64 image (runs on aarch64 hosts). The
  # jgillis/dockcross manylinux_2_28-aarch64 variant is cross-from-x64
  # (its manifest is actually amd64) and exec-format-errors on ARM runners.
  BASE_IMAGE: quay.io/pypa/manylinux_2_28_aarch64:latest
  JULIA_TARGET_ARCH: aarch64
  # GH-hosted ubuntu-24.04-arm is also 4-core, ~16 GB RAM. Same -j4 cap
  # as x64 keeps LLVM linking under OOM.
  BUILD_JOBS: 4

jobs:
  build:
    # GitHub-hosted ARM runner — needed for a native ARM Julia source build.
    # QEMU emulation of LLVM compile on an x86 runner is impractical (hours
    # and likely OOM). If `ubuntu-24.04-arm` isn't yet available to the
    # casadi org, swap for a self-hosted ARM runner.
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Free up disk space
        # ubuntu-24.04-arm has less hosted-toolcache cruft than x64, but the
        # build still wants every GB it can get.
        run: |
          set -eux
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af
          df -h /

      - name: Resolve tags
        id: tags
        run: |
          JULIA_VERSION="${{ github.event.inputs.julia_version || '1.12.6' }}"
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          {
            echo "julia_version=${JULIA_VERSION}"
            echo "tag_prod=${{ env.IMAGE }}:production"
            echo "tag_sha=${{ env.IMAGE }}:${SHA}"
            echo "tag_jl=${{ env.IMAGE }}:julia${JULIA_VERSION}"
          } >> "$GITHUB_OUTPUT"

      - name: Pull base image
        run: docker pull "$BASE_IMAGE"

      - name: Build polyglot inside container (docker run)
        run: |
          set -eux
          docker run \
            --name polyglot-build \
            -v "$PWD/scripts:/work/scripts:ro" \
            -e JULIA_VERSION="${{ steps.tags.outputs.julia_version }}" \
            -e JULIA_TARGET_ARCH="${{ env.JULIA_TARGET_ARCH }}" \
            -e BUILD_JOBS="${{ env.BUILD_JOBS }}" \
            "$BASE_IMAGE" \
            bash /work/scripts/run-in-container.sh

      - name: Commit container into polyglot image
        # PyPA base PATH: /opt/clang/bin:/opt/rh/gcc-toolset-14/root/usr/bin:...
        # (Note `usr/bin`, distinct from jgillis dockcross x64's no-`usr` layout.)
        run: |
          set -eux
          docker commit \
            --change 'ENV JULIA_HOME=/opt/julia' \
            --change 'ENV JULIA_PATH=/opt/julia' \
            --change 'ENV JULIA_VERSION=${{ steps.tags.outputs.julia_version }}' \
            --change 'ENV CARGO_HOME=/opt/rustup/cargo' \
            --change 'ENV RUSTUP_HOME=/opt/rustup' \
            --change 'ENV PATH=/opt/julia/bin:/opt/rustup/cargo/bin:/opt/clang/bin:/opt/rh/gcc-toolset-14/root/usr/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin' \
            --change 'ENV CARGO_BUILD_TARGET=${{ env.JULIA_TARGET_ARCH }}-unknown-linux-gnu' \
            --change 'WORKDIR /work' \
            --change 'LABEL org.opencontainers.image.title="manylinux_2_28 polyglot aarch64 (Julia + Rust + C/C++)"' \
            --change 'LABEL org.opencontainers.image.source=https://github.com/${{ github.repository }}' \
            --change 'LABEL casadi.polyglot.julia.version=${{ steps.tags.outputs.julia_version }}' \
            --change 'LABEL casadi.polyglot.arch=${{ env.JULIA_TARGET_ARCH }}' \
            polyglot-build \
            "${{ steps.tags.outputs.tag_prod }}"
          docker tag "${{ steps.tags.outputs.tag_prod }}" "${{ steps.tags.outputs.tag_sha }}"
          docker tag "${{ steps.tags.outputs.tag_prod }}" "${{ steps.tags.outputs.tag_jl }}"

      - name: Smoketest committed image
        run: |
          set -eux
          docker run --rm "${{ steps.tags.outputs.tag_prod }}" bash -lc '
            set -e
            julia --version
            julia -e "println(\"Julia \", VERSION, \" — LLVM \", Base.libllvm_version, \" — CPU \", Sys.CPU_NAME)"
            rustc --version
            cargo --version
            cbindgen --version
            test ! -e /opt/julia/lib/libunwind.so
            echo "polyglot post-commit OK"
          '

      - name: Push (conditional)
        if: github.event_name == 'push' || github.event.inputs.push != 'false'
        run: |
          set -eux
          docker push "${{ steps.tags.outputs.tag_prod }}"
          docker push "${{ steps.tags.outputs.tag_sha }}"
          docker push "${{ steps.tags.outputs.tag_jl }}"

      - name: Cleanup builder container
        if: always()
        run: docker rm -f polyglot-build 2>/dev/null || true
